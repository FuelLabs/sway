# TODO: Use this workspace `Forc.toml` once https://github.com/FuelLabs/sway/issues/7613 is fixed.
#       We might decide to generate this `Forc.toml` file on-the-fly or remove it altogether,
#       depending on the outcome of https://github.com/FuelLabs/sway/issues/7617.
#
#       Currently, we keep it because the `did_open_all_members_in_examples` test in `sway-lsp`
#       requires it. Note that we still commented out storage tests. With them included, the
#       `did_open_all_members_in_examples` runs a few minutes, compared to one minute when they
#       are excluded, and the memory consumption jumps for ~10GB. The root cause is likely the
#       same as in https://github.com/FuelLabs/sway/issues/7613.
