# This workspace is used primarily because the `did_open_all_members_in_examples` test
# in `sway-lsp` requires it. To run in-language test, rather than running `forc test`
# on this workspace, use the dedicated `run_in_language_tests.sh` script that offers
# more flexibility and faster execution.

# TODO: Note that we commented out storage tests. With them included, the
#       `did_open_all_members_in_examples` runs a few minutes, compared to one minute when they
#       are excluded, and the memory consumption jumps for ~10GB. The root cause is likely the
#       same as in https://github.com/FuelLabs/sway/issues/7613.
